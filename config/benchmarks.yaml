benchmarks:
  gsm8k:
    name: "GSM8K"
    hf_dataset: "openai/gsm8k"
    hf_subset: "main"
    split: "test"
    task_type: "question_answering"
    metric: "exact_match"
    max_samples: 1319   # full test set
    prompt_template: "gsm8k"
    languages: ["en"]   # English only; for multilingual use translated versions

  msmarco:
    name: "MS MARCO"
    hf_dataset: "ms_marco"
    hf_subset: "v2.1"
    split: "validation"
    task_type: "question_answering"
    metric: "rouge_l"
    max_samples: 1000
    prompt_template: "msmarco"
    languages: ["en"]

  boolq:
    name: "BoolQ"
    hf_dataset: "google/boolq"
    split: "validation"
    task_type: "classification"
    metric: "accuracy"
    max_samples: 3270   # full validation set
    prompt_template: "boolq"
    languages: ["en"]

# Multilingual evaluation datasets
multilingual:
  # Hindi — Math reasoning (parallel to English GSM8K)
  mgsm_hi:
    name: "MGSM-Hindi"
    hf_dataset: "juletxara/mgsm"
    hf_subset: "hi"
    split: "test"
    task_type: "question_answering"
    metric: "exact_match"
    max_samples: 250   # full MGSM test set is 250 per language
    language: "hi"
    script: "benchmarks/mgsm_eval.py"

  # Hindi — Reading comprehension (IndicQA)
  indicqa_hi:
    name: "IndicQA-Hindi"
    hf_dataset: "ai4bharat/IndicQA"
    hf_subset: "hi"
    split: "test"
    task_type: "extractive_qa"
    metric: "f1"
    language: "hi"
    script: "benchmarks/indicqa_eval.py"

  # Odia — Reading comprehension (IndicQA)
  indicqa_or:
    name: "IndicQA-Odia"
    hf_dataset: "ai4bharat/IndicQA"
    hf_subset: "or"
    split: "test"
    task_type: "extractive_qa"
    metric: "f1"
    language: "or"
    script: "benchmarks/indicqa_eval.py"

  # Hindi — Sentiment classification
  indic_sentiment_hi:
    name: "IndicSentiment-Hindi"
    hf_dataset: "ai4bharat/IndicSentiment"
    hf_subset: "translation-hi"
    split: "test"
    task_type: "classification"
    metric: "accuracy"
    language: "hi"
    script: "benchmarks/indic_sentiment_eval.py"

  # Odia — Sentiment classification
  indic_sentiment_or:
    name: "IndicSentiment-Odia"
    hf_dataset: "ai4bharat/IndicSentiment"
    hf_subset: "translation-or"
    split: "test"
    task_type: "classification"
    metric: "accuracy"
    language: "or"
    script: "benchmarks/indic_sentiment_eval.py"
